<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barème RP — AoT Humanity's Kingdom</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07080f;
    --card: #0d0f1a;
    --card2: #111320;
    --border: rgba(255,255,255,0.07);
    --accent: #c8a84b;
    --accent2: #e8d090;
    --red: #9b2020;
    --red2: #c0392b;
    --green: #1a6b3a;
    --green2: #27ae60;
    --white: #e8eaf0;
    --grey: #6a7080;
    --input-bg: rgba(255,255,255,0.04);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { background:var(--bg); color:var(--white); font-family:'Crimson Text',serif; min-height:100vh; }

  /* SCANLINES */
  body::after { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px); pointer-events:none; z-index:9999; }

  /* BG glow */
  body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse 60% 40% at 50% 0%, rgba(200,168,75,0.05) 0%, transparent 60%); pointer-events:none; z-index:0; }

  /* ===== HEADER ===== */
  header {
    position:relative; z-index:2;
    text-align:center; padding:3rem 2rem 2rem;
    border-bottom:1px solid var(--border);
  }
  .header-label { font-family:'Cinzel',serif; font-size:0.55rem; letter-spacing:6px; color:var(--accent); text-transform:uppercase; margin-bottom:0.8rem; opacity:0.7; }
  .header-title { font-family:'Cinzel Decorative',cursive; font-size:clamp(1.5rem,4vw,3rem); color:var(--white); }
  .header-title span { color:var(--accent); }
  .header-sub { font-family:'Cinzel',serif; font-size:0.55rem; letter-spacing:4px; color:var(--grey); text-transform:uppercase; margin-top:0.8rem; }

  /* ===== MAIN LAYOUT ===== */
  .container { max-width:1000px; margin:0 auto; padding:2rem; position:relative; z-index:2; }

  /* NEW EVAL BUTTON */
  .btn-new {
    display:flex; align-items:center; justify-content:center; gap:0.8rem;
    width:100%; padding:1rem 2rem; margin-bottom:2.5rem;
    background:linear-gradient(135deg, rgba(200,168,75,0.15), rgba(200,168,75,0.05));
    border:1px solid rgba(200,168,75,0.4);
    color:var(--accent2); font-family:'Cinzel',serif; font-size:0.75rem; letter-spacing:3px;
    text-transform:uppercase; cursor:pointer;
    transition:all 0.3s;
  }
  .btn-new:hover { background:linear-gradient(135deg,rgba(200,168,75,0.25),rgba(200,168,75,0.1)); border-color:var(--accent); box-shadow:0 0 20px rgba(200,168,75,0.1); }
  .btn-new .plus { font-size:1.4rem; line-height:1; }

  /* ===== MODAL ===== */
  .modal-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.85); z-index:1000;
    align-items:center; justify-content:center;
    padding:1rem;
  }
  .modal-overlay.open { display:flex; }

  .modal {
    background:var(--card);
    border:1px solid rgba(200,168,75,0.2);
    width:100%; max-width:680px; max-height:90vh; overflow-y:auto;
    box-shadow:0 0 60px rgba(0,0,0,0.8), 0 0 30px rgba(200,168,75,0.05);
    position:relative;
  }

  .modal-header {
    padding:1.5rem 2rem 1rem;
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .modal-title { font-family:'Cinzel',serif; font-size:0.9rem; letter-spacing:3px; color:var(--accent); text-transform:uppercase; }
  .modal-close { background:none; border:none; color:var(--grey); font-size:1.5rem; cursor:pointer; line-height:1; transition:color 0.2s; }
  .modal-close:hover { color:var(--white); }

  .modal-body { padding:1.5rem 2rem; }

  /* FORM FIELDS */
  .field { margin-bottom:1.2rem; }
  .field label { font-family:'Cinzel',serif; font-size:0.55rem; letter-spacing:3px; color:var(--accent); text-transform:uppercase; display:block; margin-bottom:0.5rem; }
  .field input[type="text"],
  .field textarea {
    width:100%; padding:0.7rem 1rem;
    background:var(--input-bg); border:1px solid var(--border);
    color:var(--white); font-family:'Crimson Text',serif; font-size:1rem;
    outline:none; resize:vertical;
    transition:border-color 0.2s;
  }
  .field input[type="text"]:focus,
  .field textarea:focus { border-color:rgba(200,168,75,0.4); }
  .field textarea { min-height:90px; }

  /* PSEUDO FIELD */
  .pseudo-hint { font-size:0.75rem; color:var(--grey); font-style:italic; margin-top:0.3rem; }

  /* SCORES GRID */
  .scores-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1.2rem; }
  @media(max-width:500px){ .scores-grid { grid-template-columns:1fr; } }

  .score-item {
    background:rgba(255,255,255,0.02);
    border:1px solid var(--border);
    padding:0.9rem 1rem;
    position:relative;
  }
  .score-label { font-family:'Cinzel',serif; font-size:0.52rem; letter-spacing:2px; color:var(--grey); text-transform:uppercase; margin-bottom:0.6rem; display:block; }
  .score-name { font-size:0.95rem; color:var(--white); margin-bottom:0.7rem; }

  .score-input-row { display:flex; align-items:center; gap:0.5rem; }
  .score-input {
    width:70px; padding:0.4rem 0.6rem; text-align:center;
    background:rgba(200,168,75,0.08); border:1px solid rgba(200,168,75,0.25);
    color:var(--accent2); font-family:'Cinzel',serif; font-size:1.1rem; font-weight:600;
    outline:none;
    transition:border-color 0.2s;
  }
  .score-input:focus { border-color:var(--accent); }
  .score-slash { color:var(--grey); font-size:0.9rem; }
  .score-bar { flex:1; height:4px; background:rgba(255,255,255,0.06); border-radius:2px; overflow:hidden; }
  .score-bar-fill { height:100%; background:linear-gradient(90deg,var(--red2),var(--accent),var(--green2)); border-radius:2px; transition:width 0.3s; }

  /* AVERAGE DISPLAY */
  .avg-display {
    background:linear-gradient(135deg,rgba(200,168,75,0.1),rgba(200,168,75,0.04));
    border:1px solid rgba(200,168,75,0.25);
    padding:1rem 1.5rem;
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:1.5rem;
  }
  .avg-label { font-family:'Cinzel',serif; font-size:0.6rem; letter-spacing:3px; color:var(--accent); text-transform:uppercase; }
  .avg-value { font-family:'Cinzel Decorative',cursive; font-size:2rem; color:var(--accent2); }

  /* PUBLISH BTN */
  .btn-publish {
    width:100%; padding:1rem;
    background:linear-gradient(135deg,rgba(155,32,32,0.3),rgba(155,32,32,0.1));
    border:1px solid rgba(155,32,32,0.5);
    color:#e88; font-family:'Cinzel',serif; font-size:0.7rem; letter-spacing:4px;
    text-transform:uppercase; cursor:pointer; transition:all 0.3s;
  }
  .btn-publish:hover { background:linear-gradient(135deg,rgba(155,32,32,0.45),rgba(155,32,32,0.2)); box-shadow:0 0 20px rgba(155,32,32,0.15); }

  /* ===== EVALUATIONS LIST ===== */
  .evals-header {
    display:flex; align-items:center; gap:1rem;
    margin-bottom:1.5rem; padding-bottom:1rem;
    border-bottom:1px solid var(--border);
  }
  .evals-title { font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:4px; color:var(--grey); text-transform:uppercase; }
  .evals-count {
    padding:0.2rem 0.7rem;
    background:rgba(200,168,75,0.1); border:1px solid rgba(200,168,75,0.2);
    font-family:'Cinzel',serif; font-size:0.55rem; letter-spacing:2px; color:var(--accent);
  }

  .empty-state { text-align:center; padding:4rem 2rem; color:var(--grey); }
  .empty-state .empty-icon { font-size:3rem; margin-bottom:1rem; opacity:0.3; }
  .empty-state p { font-style:italic; }

  /* EVAL CARD */
  .eval-card {
    background:var(--card);
    border:1px solid var(--border);
    margin-bottom:1.5rem;
    overflow:hidden;
    transition:border-color 0.3s;
  }
  .eval-card:hover { border-color:rgba(200,168,75,0.15); }

  .eval-top {
    padding:1.2rem 1.5rem;
    border-bottom:1px solid var(--border);
    display:flex; align-items:flex-start; justify-content:space-between; gap:1rem;
  }
  .eval-player-name { font-family:'Cinzel',serif; font-size:1.1rem; font-weight:900; color:var(--white); }
  .eval-rp-name { font-size:0.85rem; color:var(--grey); font-style:italic; margin-top:0.2rem; }
  .eval-meta { text-align:right; flex-shrink:0; }
  .eval-avg-big { font-family:'Cinzel Decorative',cursive; font-size:2.2rem; line-height:1; }
  .eval-avg-label { font-family:'Cinzel',serif; font-size:0.45rem; letter-spacing:3px; color:var(--grey); text-transform:uppercase; margin-top:0.2rem; }
  .eval-author { font-family:'Cinzel',serif; font-size:0.5rem; letter-spacing:2px; color:var(--grey); margin-top:0.4rem; }
  .eval-date { font-family:'Cinzel',serif; font-size:0.48rem; letter-spacing:2px; color:rgba(255,255,255,0.15); }

  .eval-scores {
    padding:1rem 1.5rem;
    display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:0.6rem;
    border-bottom:1px solid var(--border);
  }
  .eval-score-row { display:flex; align-items:center; justify-content:space-between; gap:0.8rem; }
  .eval-score-name { font-size:0.85rem; color:var(--grey); flex:1; }
  .eval-score-val { font-family:'Cinzel',serif; font-size:0.85rem; font-weight:600; min-width:36px; text-align:right; }
  .eval-score-mini-bar { flex:1; height:3px; background:rgba(255,255,255,0.05); border-radius:2px; overflow:hidden; max-width:60px; }
  .eval-score-mini-fill { height:100%; border-radius:2px; }

  .eval-desc { padding:1rem 1.5rem; font-style:italic; color:rgba(232,234,240,0.6); font-size:0.95rem; line-height:1.7; border-bottom:1px solid var(--border); }
  .eval-desc:empty { display:none; }

  .eval-actions { padding:0.8rem 1.5rem; display:flex; gap:0.8rem; justify-content:flex-end; }
  .btn-edit, .btn-delete {
    padding:0.35rem 1rem; font-family:'Cinzel',serif; font-size:0.5rem;
    letter-spacing:2px; text-transform:uppercase; cursor:pointer; border:1px solid; transition:all 0.2s;
  }
  .btn-edit { background:rgba(200,168,75,0.08); border-color:rgba(200,168,75,0.25); color:var(--accent); }
  .btn-edit:hover { background:rgba(200,168,75,0.18); }
  .btn-delete { background:rgba(155,32,32,0.08); border-color:rgba(155,32,32,0.25); color:#e88; }
  .btn-delete:hover { background:rgba(155,32,32,0.2); }

  /* SCORE COLOR HELPER */
  .score-low { color:#e74c3c; }
  .score-mid { color:var(--accent); }
  .score-high { color:#27ae60; }

  /* TOAST */
  .toast {
    position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--card2); border:1px solid rgba(200,168,75,0.3);
    padding:0.8rem 2rem; font-family:'Cinzel',serif; font-size:0.6rem; letter-spacing:3px;
    color:var(--accent); text-transform:uppercase; z-index:2000;
    opacity:0; transition:all 0.4s; pointer-events:none;
    box-shadow:0 8px 30px rgba(0,0,0,0.5);
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:rgba(200,168,75,0.2); border-radius:3px; }
</style>
</head>
<body>

<header>
  <p class="header-label">⚔ AoT Humanity's Kingdom</p>
  <h1 class="header-title">Barème <span>RP</span></h1>
  <p class="header-sub">Évaluations des joueurs · Notation sur 10</p>
</header>

<div class="container">

  <button class="btn-new" id="btnNew">
    <span class="plus">＋</span>
    Nouvelle Évaluation
  </button>

  <div class="evals-header">
    <span class="evals-title">Évaluations publiées</span>
    <span class="evals-count" id="evalsCount">0</span>
  </div>

  <div id="evalsList"></div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Nouvelle Évaluation</span>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body">

      <!-- Pseudo de l'auteur -->
      <div class="field">
        <label>Votre pseudo (staff)</label>
        <input type="text" id="authorName" placeholder="Votre pseudo RP...">
        <p class="pseudo-hint">Sera affiché comme auteur de l'évaluation. Seul l'auteur pourra modifier/supprimer.</p>
      </div>

      <!-- Joueur évalué -->
      <div class="field">
        <label>Prénom Nom du joueur RP</label>
        <input type="text" id="playerName" placeholder="Ex: Jean Kirschtein...">
      </div>

      <!-- Barème -->
      <div class="field">
        <label>Barème — Notes sur 10</label>
        <div class="scores-grid" id="scoresGrid"></div>
      </div>

      <!-- Moyenne -->
      <div class="avg-display">
        <span class="avg-label">Moyenne générale</span>
        <span class="avg-value" id="avgDisplay">—</span>
      </div>

      <!-- Description -->
      <div class="field">
        <label>Commentaire / Description (optionnel)</label>
        <textarea id="evalDesc" placeholder="Observations générales sur le joueur, points forts, axes d'amélioration..."></textarea>
      </div>

      <button class="btn-publish" id="btnPublish">⚔ Publier l'Évaluation</button>

    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CRITERIA = [
  { id:'activite',   label:'Activité' },
  { id:'rp',         label:'RP (Fear / Pain / Serious)' },
  { id:'meta',       label:'Metagaming' },
  { id:'coherence',  label:'Cohérence RP' },
  { id:'safe',       label:'Safe RP' },
  { id:'loose',      label:'Loose RP' },
  { id:'hrp',        label:'HRP' },
];

// ---- JSONBIN CONFIG ----
// Bin créé automatiquement au premier lancement
const JSONBIN_API = 'https://api.jsonbin.io/v3';
const API_KEY = '$2a$10$GJ2hGf9XK/FgQnyhj7fVn.f.vQwyDcYBVq2kglC9ffQPux9V1OITG'; // sera remplacé dynamiquement
let BIN_ID = '69a0d190d0ea881f40dd1cb5'; // Bin partagé fixe

// On utilise un bin public partagé via une clé fixe dans le nom
// Pour contourner l'auth, on utilise un bin public sans clé API
async function dbGet() {
  if (!BIN_ID) return [];
  try {
    const r = await fetch(`${JSONBIN_API}/b/${BIN_ID}/latest`, {
      headers: { 'X-Access-Key': '$2a$10$GJ2hGf9XK/FgQnyhj7fVn.f.vQwyDcYBVq2kglC9ffQPux9V1OITG' }
    });
    if (!r.ok) return [];
    const data = await r.json();
    return data.record?.evals || [];
  } catch(e) { return []; }
}

async function dbSet(evals) {
  const body = JSON.stringify({ evals });
  const r = await fetch(`${JSONBIN_API}/b/${BIN_ID}`, {
    method:'PUT',
    headers:{
      'Content-Type':'application/json',
      'X-Access-Key':'$2a$10$GJ2hGf9XK/FgQnyhj7fVn.f.vQwyDcYBVq2kglC9ffQPux9V1OITG'
    },
    body
  });
  return r.ok;
}

// ---- FALLBACK: localStorage si JSONBin échoue ----
function lsGet() {
  try { return JSON.parse(localStorage.getItem('aot_evals') || '[]'); } catch(e) { return []; }
}
function lsSet(evals) {
  localStorage.setItem('aot_evals', JSON.stringify(evals));
}

async function getAllEvals() {
  // Essaie JSONBin d'abord, sinon localStorage
  if (BIN_ID) {
    const evals = await dbGet();
    if (evals.length > 0 || BIN_ID) return evals;
  }
  return lsGet();
}

async function saveAllEvals(evals) {
  lsSet(evals); // toujours sauvegarder en local
  try {
    await dbSet(evals);
  } catch(e) {
    // silently fail, local storage is backup
  }
}

let editingId = null;

// ---- BUILD SCORE GRID ----
function buildScoreGrid() {
  const grid = document.getElementById('scoresGrid');
  grid.innerHTML = '';
  CRITERIA.forEach(c => {
    const item = document.createElement('div');
    item.className = 'score-item';
    item.innerHTML = `
      <span class="score-label">Critère</span>
      <div class="score-name">${c.label}</div>
      <div class="score-input-row">
        <input type="number" class="score-input" id="score_${c.id}" min="0" max="10" step="0.5" placeholder="—">
        <span class="score-slash">/ 10</span>
        <div class="score-bar"><div class="score-bar-fill" id="bar_${c.id}" style="width:0%"></div></div>
      </div>`;
    grid.appendChild(item);
    const input = item.querySelector(`#score_${c.id}`);
    input.addEventListener('input', () => { updateBar(c.id); updateAvg(); });
  });
}

function updateBar(id) {
  const val = parseFloat(document.getElementById('score_'+id).value) || 0;
  const pct = Math.min(val/10*100, 100);
  document.getElementById('bar_'+id).style.width = pct + '%';
}

function updateAvg() {
  const vals = CRITERIA.map(c => parseFloat(document.getElementById('score_'+c.id).value)).filter(v => !isNaN(v));
  if (vals.length === 0) { document.getElementById('avgDisplay').textContent = '—'; return; }
  const avg = (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2);
  document.getElementById('avgDisplay').textContent = avg + ' / 10';
  document.getElementById('avgDisplay').className = 'avg-value ' + scoreClass(parseFloat(avg));
}

function getScores() {
  const scores = {};
  CRITERIA.forEach(c => {
    const v = parseFloat(document.getElementById('score_'+c.id).value);
    scores[c.id] = isNaN(v) ? null : Math.min(Math.max(v,0),10);
  });
  return scores;
}

function calcAvg(scores) {
  const vals = Object.values(scores).filter(v => v !== null);
  if (!vals.length) return null;
  return parseFloat((vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2));
}

function scoreClass(v) {
  if (v === null || v === undefined) return '';
  if (v >= 7.5) return 'score-high';
  if (v >= 4) return 'score-mid';
  return 'score-low';
}

function scoreColor(v) {
  if (v === null || v === undefined) return 'rgba(255,255,255,0.2)';
  if (v >= 7.5) return '#27ae60';
  if (v >= 4) return '#c8a84b';
  return '#e74c3c';
}

// ---- MODAL ----
function openModal(evalData = null) {
  buildScoreGrid();
  document.getElementById('playerName').value = '';
  document.getElementById('authorName').value = '';
  document.getElementById('evalDesc').value = '';
  editingId = null;

  if (evalData) {
    editingId = evalData.id;
    document.getElementById('modalTitle').textContent = 'Modifier l\'Évaluation';
    document.getElementById('playerName').value = evalData.playerName || '';
    document.getElementById('authorName').value = evalData.author || '';
    document.getElementById('evalDesc').value = evalData.desc || '';
    CRITERIA.forEach(c => {
      const v = evalData.scores[c.id];
      if (v !== null && v !== undefined) {
        document.getElementById('score_'+c.id).value = v;
        updateBar(c.id);
      }
    });
    updateAvg();
  } else {
    document.getElementById('modalTitle').textContent = 'Nouvelle Évaluation';
    updateAvg();
  }

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
}

document.getElementById('btnNew').addEventListener('click', () => openModal());
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === document.getElementById('modalOverlay')) closeModal(); });

// ---- PUBLISH ----
document.getElementById('btnPublish').addEventListener('click', async () => {
  const playerName = document.getElementById('playerName').value.trim();
  const author = document.getElementById('authorName').value.trim();
  const desc = document.getElementById('evalDesc').value.trim();
  const scores = getScores();
  const avg = calcAvg(scores);

  if (!playerName) { showToast('⚠ Entrez le nom du joueur'); return; }
  if (!author) { showToast('⚠ Entrez votre pseudo'); return; }

  document.getElementById('btnPublish').textContent = 'Publication...';
  document.getElementById('btnPublish').disabled = true;

  try {
    let evals = await getAllEvals();

    if (editingId) {
      const idx = evals.findIndex(e => e.id === editingId);
      if (idx !== -1) {
        evals[idx] = { ...evals[idx], playerName, author, desc, scores, avg };
      }
    } else {
      evals.unshift({
        id: Date.now().toString(),
        playerName, author, desc, scores, avg,
        date: new Date().toLocaleDateString('fr-FR')
      });
    }

    await saveAllEvals(evals);
    closeModal();
    showToast(editingId ? '✓ Évaluation modifiée' : '✓ Évaluation publiée');
    loadEvals();
  } catch(e) {
    showToast('⚠ Erreur — données sauvegardées en local');
    closeModal();
    loadEvals();
  } finally {
    document.getElementById('btnPublish').textContent = '⚔ Publier l\'Évaluation';
    document.getElementById('btnPublish').disabled = false;
  }
});

// ---- LOAD & RENDER ----
async function loadEvals() {
  const list = document.getElementById('evalsList');
  list.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--grey);font-style:italic;">Chargement...</div>';

  const evals = await getAllEvals();

  document.getElementById('evalsCount').textContent = evals.length;

  if (evals.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>Aucune évaluation publiée pour l'instant.</p></div>`;
    return;
  }

  list.innerHTML = '';
  evals.forEach(ev => list.appendChild(renderCard(ev)));
}

function renderCard(ev) {
  const card = document.createElement('div');
  card.className = 'eval-card';
  card.id = 'card_' + ev.id;

  const avg = ev.avg;
  const avgStr = avg !== null && avg !== undefined ? Number(avg).toFixed(2) : '—';
  const avgCls = scoreClass(avg);

  let scoresHTML = '';
  CRITERIA.forEach(c => {
    const v = ev.scores[c.id];
    const vStr = v !== null && v !== undefined ? v + '/10' : '—';
    const vCls = scoreClass(v);
    const pct = v !== null && v !== undefined ? v*10 : 0;
    const col = scoreColor(v);
    scoresHTML += `
      <div class="eval-score-row">
        <span class="eval-score-name">${c.label}</span>
        <div class="eval-score-mini-bar"><div class="eval-score-mini-fill" style="width:${pct}%;background:${col}"></div></div>
        <span class="eval-score-val ${vCls}">${vStr}</span>
      </div>`;
  });

  card.innerHTML = `
    <div class="eval-top">
      <div>
        <div class="eval-player-name">${escHtml(ev.playerName)}</div>
        <div class="eval-rp-name">Joueur RP évalué</div>
        <div class="eval-author">Par <strong>${escHtml(ev.author)}</strong></div>
        <div class="eval-date">${ev.date || ''}</div>
      </div>
      <div class="eval-meta">
        <div class="eval-avg-big ${avgCls}">${avgStr}</div>
        <div class="eval-avg-label">/ 10 · Moyenne</div>
      </div>
    </div>
    <div class="eval-scores">${scoresHTML}</div>
    ${ev.desc ? `<div class="eval-desc">${escHtml(ev.desc)}</div>` : ''}
    <div class="eval-actions">
      <button class="btn-edit" onclick="editEval('${ev.id}')">✎ Modifier</button>
      <button class="btn-delete" onclick="deleteEval('${ev.id}')">✕ Supprimer</button>
    </div>`;

  return card;
}

async function editEval(id) {
  const pseudo = prompt('Entrez votre pseudo pour confirmer :');
  if (!pseudo) return;
  const evals = await getAllEvals();
  const ev = evals.find(e => e.id === id);
  if (!ev) return;
  if (ev.author.toLowerCase() !== pseudo.toLowerCase()) {
    showToast('⚠ Pseudo incorrect — accès refusé');
    return;
  }
  openModal(ev);
}

async function deleteEval(id) {
  const pseudo = prompt('Entrez votre pseudo pour confirmer la suppression :');
  if (!pseudo) return;
  let evals = await getAllEvals();
  const ev = evals.find(e => e.id === id);
  if (!ev) return;
  if (ev.author.toLowerCase() !== pseudo.toLowerCase()) {
    showToast('⚠ Pseudo incorrect — accès refusé');
    return;
  }
  if (!confirm(`Supprimer l'évaluation de ${ev.playerName} ?`)) return;
  evals = evals.filter(e => e.id !== id);
  await saveAllEvals(evals);
  showToast('✓ Évaluation supprimée');
  loadEvals();
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ---- INIT ----
loadEvals();


</script>
</body>
</html>
